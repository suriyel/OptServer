<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蚕丛 · 运营看板</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230c0e12'/%3E%3Crect x='9' y='9' width='14' height='14' rx='3' transform='rotate(45 16 16)' fill='%23f0a830'/%3E%3C/svg%3E">
  <link rel="preload" as="font" type="font/woff2" href="/vendor/fonts/ibm-plex-mono-500.woff2" crossorigin>
  <link rel="stylesheet" href="/vendor/uPlot.min.css">
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">蚕丛 <span class="brand-sub">运营看板</span></div>
    <nav class="tabs" id="tabs">
      <a href="#overview" data-tab="overview">概览</a>
      <a href="#trend" data-tab="trend">趋势</a>
      <a href="#blueprints" data-tab="blueprints">工作流</a>
      <a href="#users" data-tab="users">用户</a>
      <a href="#failures" data-tab="failures">失败</a>
      <a href="#installs" data-tab="installs">实例</a>
    </nav>
    <div class="topbar-right">
      <select id="range-select" title="统计范围">
        <option value="7">近 7 天</option>
        <option value="30" selected>近 30 天</option>
        <option value="90">近 90 天</option>
      </select>
      <span id="refresh-hint" class="muted"></span>
    </div>
  </header>
  <main id="main">
    <section id="page-overview" class="page"></section>
    <section id="page-trend" class="page"></section>
    <section id="page-blueprints" class="page"></section>
    <section id="page-users" class="page"></section>
    <section id="page-failures" class="page"></section>
    <section id="page-installs" class="page"></section>
  </main>
  <!-- vendored 库挂 window，ESM 侧经 core/charts.js（uPlot）、core/echarts.js（ECharts）收口访问 -->
  <script src="/vendor/uPlot.iife.min.js"></script>
  <script src="/vendor/echarts.min.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
